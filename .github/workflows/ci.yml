name: CI

on:
  push:
    branches: [ main, master ]
    # Skip CI for docs-only / memory / bench-output commits — they cannot
    # affect compile/test outcomes. Without this filter every wins/errors
    # entry triggers a 10-15 min CI run for no value.
    paths-ignore:
      - 'docs/**'
      - 'bench-output/**'
      - 'memory/**'
      - '**/*.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - 'README.md'
      - 'README.zh-CN.md'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - 'bench-output/**'
      - 'memory/**'
      - '**/*.md'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run repo hygiene checks
        run: python3 scripts/check_repo_hygiene.py

  # ── macOS arm64: Metal feature surface ──────────────────────────────────────
  check-macos:
    name: Check (macOS Metal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-arm64-cargo-

      - name: cargo check (Metal infer lib)
        working-directory: infer
        run: cargo check --no-default-features --features metal,no-cuda --lib

      - name: cargo check (Metal CLI surface)
        run: cargo check --no-default-features --features metal,no-cuda,cli -p agent-infer --bin arle

      - name: cargo check (Metal train/autograd libs)
        run: |
          cargo check -p autograd --release --features metal --lib
          cargo check -p train --release --features metal --lib

      - name: cargo test (kv-native-sys POSIX substrate)
        # kv-native-sys is the pure-Rust persistence substrate (file/block I/O,
        # WAL, mmap, POSIX shm, host arena). Linux coverage lives in the `test`
        # job; this step is the canonical macOS POSIX gate.
        run: cargo test -p kv-native-sys --release

      - name: cargo test (Metal CLI unit tests)
        run: cargo test -p cli --release --no-default-features --features metal,no-cuda

      - name: cargo test (Metal ARLE smoke path)
        run: cargo test -p agent-infer --release --no-default-features --features metal,no-cuda,cli --test cli_smoke

  # ── Linux: CPU-only (no CUDA, no Metal) ─────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Keep Rust CI focused on the infer library's CPU-only surface.
      - name: cargo check (CPU-only)
        working-directory: infer
        run: cargo check --no-default-features --features no-cuda --lib

      - name: cargo check (ARLE CPU smoke path)
        run: cargo check -p agent-infer --no-default-features --features cpu,no-cuda,cli --bin arle

      - name: cargo check (workspace support crates)
        run: |
          cargo check -p autograd --release --features no-cuda --lib
          cargo check -p train --release --features no-cuda --lib

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test (CPU-only)
        working-directory: infer
        run: cargo test --no-default-features --features no-cuda --lib

      - name: cargo test (CLI crate)
        run: cargo test -p cli --release --no-default-features --features no-cuda

      - name: cargo test (ARLE CPU smoke path)
        run: cargo test -p agent-infer --release --no-default-features --features cpu,no-cuda,cli

      - name: cargo test (workspace support crates)
        run: |
          cargo test -p chat -p tools -p qwen3-spec -p qwen35-spec -p kv-native-sys --release
          cargo test -p autograd --release --features no-cuda --lib
          cargo test -p train --release --features no-cuda --lib

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo clippy (CPU-only)
        working-directory: infer
        run: cargo clippy --no-default-features --features no-cuda --lib -- -D warnings

      - name: cargo clippy (CLI crate)
        run: cargo clippy -p cli --release --no-default-features --features no-cuda -- -D warnings

      - name: cargo clippy (ARLE CPU smoke path)
        run: cargo clippy -p agent-infer --no-default-features --features cpu,no-cuda,cli --bin arle -- -D warnings

      - name: cargo clippy (workspace support crates)
        run: |
          cargo clippy -p autograd --release --features no-cuda --lib -- -D warnings
          cargo clippy -p train --release --features no-cuda --lib -- -D warnings
          cargo clippy -p kv-native-sys --release --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt check (scoped to changed .rs files)
        # Workspace-wide `cargo fmt --all -- --check` trips on any
        # un-formatted file the WORKTREE happens to contain — including
        # files left dirty by parallel-track work that this commit
        # didn't touch. Scope to the actual delta instead so CI failure
        # tracks the commit, not the worktree. Drift is caught by the
        # periodic nightly full-workspace fmt sweep (see fmt-nightly).
        run: bash scripts/ci-fmt-check-changed.sh

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/python/ -v
