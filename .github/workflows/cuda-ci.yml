name: CUDA CI

on:
  # Auto-trigger disabled: this workflow needs a self-hosted runner with the
  # `gpu`+`cuda` labels, and none is currently registered for the repo. Pushes
  # would queue forever and get cancel-in-progress'd by the next push. Re-enable
  # the `push` / `pull_request` blocks (see git history) once a runner is back.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CUDA_HOME: /usr/local/cuda

concurrency:
  group: cuda-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cuda-check:
    name: CUDA check + tiny fixture CLI
    runs-on: [self-hosted, linux, x64, gpu, cuda]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cuda-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cuda-

      - name: cargo check (cuda + no-cuda infer lib)
        run: cargo check -p infer --release --no-default-features --features cuda,no-cuda --lib

      - name: cargo check (cuda + no-cuda CLI)
        run: >
          cargo check -p agent-infer --release
          --no-default-features --features cuda,no-cuda,cli
          --bin arle

      - name: cargo test (cuda + no-cuda CLI crate)
        run: cargo test -p cli --release --no-default-features --features cuda,no-cuda

      - name: cargo test (cuda + no-cuda ARLE help/smoke path)
        run: >
          cargo test -p agent-infer --release
          --no-default-features --features cuda,no-cuda,cli
          --test cli_smoke

